services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/vello.db
      ENV: production
    volumes:
      - vello_data:/data
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - vello_data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: replicate -config /etc/litestream.yml
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  vello_data:
